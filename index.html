<head>

    <title>マンション・ゾンビ・サバイバル - Wide Light</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px;
            color: #0f0; font-size: 28px; text-shadow: 2px 2px 5px #000;
            letter-spacing: 2px; z-index: 10;
        }
        #instructions {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; background: rgba(0,0,0,0.9);
            cursor: pointer; z-index: 20;
        }
        h1 { color: #ff0000; margin-bottom: 10px; font-size: 48px; }
        p { font-size: 18px; line-height: 1.6; }
    </style>
</head>
